server:
  port: 8080

spring:
  application:
    name: ms-news
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
#      password: ${REDIS_PASSWORD}
  cache:
    type: redis
    cache-names: "top-headlines,everything-news,sources"
    redis:
      time-to-live: 24h
      key-prefix: "ms-news::"
      use-key-prefix: true
      cache-null-values: true

springdoc:
  default-consumes-media-type: 'application/json'
  default-produces-media-type: 'application/json'
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

web-service-news:
  api:
    base-url: https://newsapi.org/v2
    key: ${NEWS_API_KEY}
